adapters = ["npm"]
tag_format = "{name}@{version}"
provider = "github"
default_branch = "main"
changelog_strategy = "curated"
changelog_scope = "package"
github_release_notes = "curated-changelog"

[hooks]

[publish.ignore_paths]
"@opentf/obj-diff" = []

[[package]]
name = "@opentf/obj-diff"
adapter = "npm"
mode = "publish"
matrix = false
command = "npm run build"
artifacts = ""
manifest = "packages/obj-diff/package.json"
